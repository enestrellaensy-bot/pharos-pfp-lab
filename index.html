<!DOCTYPE html>
<html>
<head>
<title>Pharos PFP Lab</title>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;

background:url("fon.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;

width:100%;
z-index:1000;

background:rgba(10,25,60,0.45);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.15);
}

.header-inner{
width:100%;
display:flex;
align-items:center;
justify-content:space-between;

padding:18px 40px;
box-sizing:border-box;
}

.title{
font-size:38px;
font-weight:700;
}

/* TWITTER BUTTON */

.header-buttons a{
color:white;
text-decoration:none;

padding:10px 22px;
border-radius:12px;

background:rgba(255,255,255,0.12);
border:1px solid rgba(255,255,255,0.25);

backdrop-filter:blur(10px);

transition:0.25s;
}

.header-buttons a:hover{

background:rgba(255,255,255,0.25);

box-shadow:
0 0 20px rgba(255,255,255,0.35),
0 0 40px rgba(180,220,255,0.35);

transform:translateY(-2px);
}

/* CONTENT */

.container{
padding:140px 20px 50px 20px;
text-align:center;
}

/* FRAME */

.center-image{
position:relative;

width:100%;
max-width:1100px;
margin:auto;

background:rgba(255,255,255,0.20);
border:3px solid rgba(255,255,255,0.55);

padding:30px;
border-radius:24px;

backdrop-filter:blur(14px);

box-shadow:
0 0 40px rgba(255,255,255,0.35),
0 0 90px rgba(180,220,255,0.35),
inset 0 0 25px rgba(255,255,255,0.25);
}

/* SLIDER */

.slider-wrapper{
overflow:hidden;
border-radius:16px;
}

.slider{
display:flex;
transition:transform 0.4s ease;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
display:block;
}

/* ARROWS */

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);

background:rgba(220,230,255,0.65);
color:#0b1f4a;
border:none;

font-size:30px;
padding:12px 18px;

cursor:pointer;
border-radius:12px;

box-shadow:
0 0 12px rgba(180,220,255,0.35),
0 0 24px rgba(180,220,255,0.25);
}

.left{
left:-60px;
}

.right{
right:-60px;
}

/* SUBMIT BUTTON */

.button{
margin-top:45px;
}

.button a{

color:white;
text-decoration:none;
font-size:20px;

padding:16px 40px;
border-radius:16px;

background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.35);

backdrop-filter:blur(12px);

transition:0.25s;
}

.button a:hover{

background:rgba(255,255,255,0.28);

box-shadow:
0 0 25px rgba(255,255,255,0.4),
0 0 60px rgba(180,220,255,0.35);

transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="header">
<div class="header-inner">

<div class="title">
Pharos PFP Lab
</div>

<div class="header-buttons">
<a href="https://x.com/oooknorov" target="_blank">Twitter</a>
</div>

</div>
</div>

<div class="container">

<div class="center-image">

<button class="arrow left" onclick="prevSlide()">❮</button>

<div class="slider-wrapper">

<div class="slider" id="slider">

<div class="slide">
<img src="centr.jpg">
</div>

<div class="slide">
<img src="centr 2.jpg">
</div>

<div class="slide">
<img src="centr 3.jpg">
</div>

</div>

</div>

<button class="arrow right" onclick="nextSlide()">❯</button>

</div>

<div class="button">
<a href="https://docs.google.com/forms/d/e/1FAIpQLSc83PnMHydifF9i0wZOFSJL-igh6bLhZgTlwsWMbPA8-Yw-2A/viewform" target="_blank">
Submit your PFP
</a>
</div>

</div>

<script>

let index = 0
const slider = document.getElementById("slider")
const slides = document.querySelectorAll(".slide")

function update(){
slider.style.transform = "translateX(-"+index*100+"%)"
}

function nextSlide(){
index++
if(index >= slides.length){ index = 0 }
update()
}

function prevSlide(){
index--
if(index < 0){ index = slides.length-1 }
update()
}

</script>

</body>
</html>
