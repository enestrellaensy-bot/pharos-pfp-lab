<!DOCTYPE html>
<html>
<head>
<title>Pharos PFP Lab</title>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;

background:url("fon.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* HEADER */

.header{
width:100%;
background:rgba(10,25,60,0.45);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.15);
}

.header-inner{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 20px;
}

.title{
font-size:38px;
font-weight:700;
}

.header-buttons{
display:flex;
gap:14px;
}

.header-buttons a{
background:#6c5cff;
color:white;
padding:10px 22px;
border-radius:10px;
text-decoration:none;
font-size:16px;
font-weight:600;
}

/* CONTENT */

.container{
padding:50px 20px;
text-align:center;
}

/* FRAME */

.center-image{
width:100%;
max-width:1100px;
margin:auto;

background:rgba(255,255,255,0.20);
border:3px solid rgba(255,255,255,0.55);

padding:30px;
border-radius:24px;

backdrop-filter:blur(14px);

box-shadow:
0 0 40px rgba(255,255,255,0.35),
0 0 90px rgba(180,220,255,0.35),
inset 0 0 25px rgba(255,255,255,0.25);

overflow:hidden;
}

/* SLIDER */

.slider{
display:flex;
transition:transform 0.4s ease;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
border-radius:16px;
display:block;
}

/* BUTTON */

.button{
margin-top:40px;
}

.button a{
background:#6c5cff;
color:white;
padding:16px 36px;
border-radius:12px;
text-decoration:none;
font-size:20px;
display:inline-block;
}

</style>
</head>

<body>

<div class="header">
<div class="header-inner">

<div class="title">
Pharos PFP Lab
</div>

<div class="header-buttons">
<a href="PASTE_TWITTER_LINK_HERE" target="_blank">Twitter</a>
<a href="PASTE_DISCORD_LINK_HERE" target="_blank">Discord</a>
</div>

</div>
</div>

<div class="container">

<div class="center-image">

<div class="slider" id="slider">

<div class="slide">
<img src="centr.jpg">
</div>

<div class="slide">
<img src="centr 2.jpg">
</div>

<div class="slide">
<img src="centr 3.jpg">
</div>

</div>

</div>

<div class="button">
<a href="https://docs.google.com/forms/d/e/1FAIpQLSc83PnMHydifF9i0wZOFSJL-igh6bLhZgTlwsWMbPA8-Yw-2A/viewform" target="_blank">
Submit your PFP
</a>
</div>

</div>

<script>

let slider = document.getElementById("slider")
let slides = document.querySelectorAll(".slide")

let startX = 0
let index = 0

function update(){
slider.style.transform = "translateX(-"+index*100+"%)"
}

/* TOUCH */

slider.addEventListener("touchstart", e=>{
startX = e.touches[0].clientX
})

slider.addEventListener("touchend", e=>{
let endX = e.changedTouches[0].clientX
let diff = endX - startX

if(diff > 60){
index--
}

if(diff < -60){
index++
}

if(index < 0) index = 0
if(index > slides.length-1) index = slides.length-1

update()
})

/* MOUSE */

slider.addEventListener("mousedown", e=>{
startX = e.clientX
})

slider.addEventListener("mouseup", e=>{
let diff = e.clientX - startX

if(diff > 60){
index--
}

if(diff < -60){
index++
}

if(index < 0) index = 0
if(index > slides.length-1) index = slides.length-1

update()
})

</script>

</body>
</html>
