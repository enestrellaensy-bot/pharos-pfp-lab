<!DOCTYPE html>
<html>
<head>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<title>Pharos PFP Lab</title>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;

background:url("fon.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;

width:100%;
z-index:1000;

background:rgba(10,25,60,0.45);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.15);
}

.header-inner{
position:relative;

width:100%;
display:flex;
align-items:center;
justify-content:flex-end;

padding:26px 40px;
box-sizing:border-box;
}

/* TITLE */

.title{

position:absolute;
left:50%;
transform:translateX(-50%);

font-family:'Orbitron', sans-serif;
font-size:42px;
font-weight:700;

letter-spacing:3px;

background:linear-gradient(
90deg,
#cfd6e3,
#ffffff,
#aeb7c4,
#ffffff,
#cfd6e3
);

background-size:300%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:shine 5s linear infinite;

text-shadow:
0 0 10px rgba(255,255,255,0.25),
0 0 25px rgba(180,220,255,0.25);
}

/* TWITTER BUTTON */

.header-buttons a{
color:white;
text-decoration:none;

padding:14px 32px;
font-size:18px;

border-radius:14px;

background:rgba(255,255,255,0.12);
border:1px solid rgba(255,255,255,0.25);

backdrop-filter:blur(10px);

transition:0.25s;
}

.header-buttons a:hover{

background:rgba(255,255,255,0.25);

box-shadow:
0 0 20px rgba(255,255,255,0.35),
0 0 40px rgba(180,220,255,0.35);

transform:translateY(-2px);
}

/* CONTENT */

.container{
padding:140px 20px 50px 20px;
text-align:center;
}

/* FRAME */

.center-image{
position:relative;

width:100%;
max-width:1100px;
margin:auto;

background:rgba(255,255,255,0.20);
border:3px solid rgba(255,255,255,0.55);

padding:30px;
border-radius:24px;

backdrop-filter:blur(14px);

box-shadow:
0 0 40px rgba(255,255,255,0.35),
0 0 90px rgba(180,220,255,0.35),
inset 0 0 25px rgba(255,255,255,0.25);
}

/* SLIDER */

.slider-wrapper{
overflow:hidden;
border-radius:16px;
}

.slider{
display:flex;
transition:transform 0.4s ease;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
display:block;
}

/* ARROWS */

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);

background:rgba(220,230,255,0.65);
color:#0b1f4a;
border:none;

font-size:30px;
padding:12px 18px;

cursor:pointer;
border-radius:12px;

box-shadow:
0 0 12px rgba(180,220,255,0.35),
0 0 24px rgba(180,220,255,0.25);
}

.left{
left:-60px;
}

.right{
right:-60px;
}

/* SUBMIT BUTTON */

.button{
margin-top:45px;
}

.button a{

color:#e8f0ff;
text-decoration:none;

font-family:'Orbitron', sans-serif;
font-size:22px;
font-weight:600;
letter-spacing:1px;

padding:18px 46px;
border-radius:16px;

background:linear-gradient(
135deg,
rgba(160,120,255,0.35),
rgba(120,80,255,0.35)
);;

border:1px solid rgba(200,220,255,0.55);

backdrop-filter:blur(10px);

box-shadow:
0 0 14px rgba(160,120,255,0.45),
0 0 40px rgba(140,100,255,0.35);

transition:0.25s;
}
.button a:hover{

transform:translateY(-3px);

box-shadow:
0 0 18px rgba(170,120,255,0.55),
0 0 45px rgba(170,120,255,0.45),
0 0 80px rgba(170,120,255,0.35);
}

background:rgba(255,255,255,0.28);

box-shadow:
0 0 25px rgba(255,255,255,0.4),
0 0 60px rgba(180,220,255,0.35);

transform:translateY(-2px);
}

/* SHINE ANIMATION */

@keyframes shine{
0%{
background-position:0%;
}
100%{
background-position:300%;
}
}

</style>

</head>

<body>

<div class="header">
<div class="header-inner">

<div class="title">
Pharos PFP Lab
</div>

<div class="header-buttons">
<a href="https://x.com/oooknorov" target="_blank">Twitter</a>
</div>

</div>
</div>

<div class="container">

<div class="center-image">

<button class="arrow left" onclick="prevSlide()">❮</button>

<div class="slider-wrapper">

<div class="slider" id="slider">

<div class="slide">
<img src="centr.jpg">
</div>

<div class="slide">
<img src="centr 2.jpg">
</div>

<div class="slide">
<img src="centr 3.jpg">
</div>

</div>

</div>

<button class="arrow right" onclick="nextSlide()">❯</button>

</div>

<div class="button">
<a href="https://docs.google.com/forms/d/e/1FAIpQLSc83PnMHydifF9i0wZOFSJL-igh6bLhZgTlwsWMbPA8-Yw-2A/viewform" target="_blank">
Submit your PFP
</a>
</div>

</div>

<script>

let index = 0
const slider = document.getElementById("slider")
const slides = document.querySelectorAll(".slide")

function update(){
slider.style.transform = "translateX(-"+index*100+"%)"
}

function nextSlide(){
index++
if(index >= slides.length){ index = 0 }
update()
}

function prevSlide(){
index--
if(index < 0){ index = slides.length-1 }
update()
}

</script>

</body>
</html>
