<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<title>Pharos PFP Lab</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:sans-serif;
color:white;

background:url("fon.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;

overflow-x:hidden;
}

/* HEADER */

.header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;

background:rgba(10,25,60,0.45);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.15);
}

.header-inner{
position:relative;
width:100%;
display:flex;
align-items:center;
justify-content:flex-end;
padding:26px 40px;
box-sizing:border-box;
}

.logo{

position:absolute;
left:30px;

height:100px;
width:100px;

object-fit:cover;

border-radius:50%;

top:50%;
transform:translateY(-50%);

box-shadow:
0 0 14px rgba(180,220,255,0.35),
0 0 34px rgba(180,220,255,0.25);

transition:0.25s;

}

.logo:hover{

box-shadow:
0 0 18px rgba(180,220,255,0.6),
0 0 40px rgba(180,220,255,0.45);

transform:translateY(-50%) scale(1.05);

}

.header-line{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:-1px;

width:420px;
height:2px;

background:linear-gradient(
90deg,
transparent,
rgba(180,220,255,0.8),
transparent
);

box-shadow:
0 0 12px rgba(180,220,255,0.6),
0 0 30px rgba(180,220,255,0.4);
}

/* TITLE */

.title{
position:absolute;
left:50%;
transform:translateX(-50%);

font-family:'Orbitron', sans-serif;
font-size:48px;
font-weight:700;
letter-spacing:3px;

background:linear-gradient(
90deg,
#9ea7b3,
#ffffff,
#cfd6e3,
#ffffff,
#9ea7b3
);

background-size:400%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:shine 6s linear infinite;

text-shadow:
0 0 12px rgba(255,255,255,0.25),
0 0 35px rgba(180,220,255,0.35),
0 8px 35px rgba(180,220,255,0.35);
}

/* TWITTER BUTTON */

.header-buttons a{
color:#eaf1ff;
text-decoration:none;

font-family:'Orbitron', sans-serif;
font-size:20px;
font-weight:600;
letter-spacing:1px;

padding:16px 42px;

border-radius:18px;

background:linear-gradient(
135deg,
rgba(120,140,255,0.25),
rgba(180,220,255,0.25)
);

border:1px solid rgba(200,220,255,0.45);

backdrop-filter:blur(10px);

box-shadow:
0 0 12px rgba(140,160,255,0.25),
0 0 30px rgba(140,160,255,0.15);

transition:0.25s;
}

.x-icon{

display:flex;
align-items:center;
justify-content:center;

width:42px;
height:42px;

border-radius:12px;

color:#eaf1ff;

background:rgba(255,255,255,0.12);
border:1px solid rgba(255,255,255,0.25);

backdrop-filter:blur(10px);

transition:0.25s;

}

.x-icon:hover{

box-shadow:
0 0 18px rgba(140,160,255,0.55),
0 0 45px rgba(140,160,255,0.45);

transform:translateY(-2px);

}
/* CONTENT */

.container{
max-width:1400px;
margin:auto;
padding:140px 20px 50px 20px;
text-align:center;
}

/* FRAME */

.center-image{
position:relative;
width:100%;
max-width:1100px;
margin:auto;

background:rgba(255,255,255,0.20);
border:3px solid rgba(255,255,255,0.55);

padding:30px;
border-radius:24px;

backdrop-filter:blur(14px);

box-shadow:
0 0 40px rgba(255,255,255,0.35),
0 0 90px rgba(180,220,255,0.35),
inset 0 0 25px rgba(255,255,255,0.25);

box-sizing:border-box;
}

/* SLIDER */

.slider-wrapper{
overflow:hidden;
border-radius:16px;
}

.slider{
display:flex;
transition:transform 0.4s ease;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
display:block;
}

/* ARROWS */

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);

background:rgba(220,230,255,0.8);
color:#0b1f4a;
border:none;

font-size:28px;
padding:10px 16px;

cursor:pointer;
border-radius:12px;

box-shadow:
0 0 14px rgba(180,220,255,0.35);

z-index:10;
}

/* DESKTOP */

.left{
left:-60px;
}

.right{
right:-60px;
}

/* SUBMIT BUTTON */

.button{
margin-top:45px;
}

.button a{
color:#e8f0ff;
text-decoration:none;

font-family:'Orbitron', sans-serif;
font-size:22px;

padding:18px 46px;
border-radius:16px;

background:linear-gradient(
135deg,
rgba(160,120,255,0.35),
rgba(120,80,255,0.35)
);

border:1px solid rgba(200,220,255,0.55);
}

/* FOOTER */

.footer{
margin-top:140px;
text-align:center;

font-family:'Orbitron', sans-serif;
font-size:14px;
letter-spacing:1px;

color:#cfd6e3;
}

/* MOBILE */

@media (max-width:768px){

.header-inner{
flex-direction:column;
gap:12px;
padding:18px 10px;
}

.title{
position:static;
transform:none;
font-size:28px;
text-align:center;
}

.header-buttons{
display:flex;
justify-content:center;
}

.header-buttons a{

font-size:14px;
padding:8px 18px;

}

.container{
padding:160px 15px 40px 15px;
}

.center-image{
padding:15px;
}

/* стрелки внутрь */

.left{
left:8px;
}

.right{
right:8px;
}

.arrow{

font-size:22px;

padding:8px 8px;   /* было широкое — стало узкое */

min-width:28px;    /* чтобы кнопка не растягивалась */

display:flex;
align-items:center;
justify-content:center;

z-index:20;

}

.button a{
font-size:18px;
padding:14px 28px;
}

}

/* ANIMATION */

@keyframes shine{
0%{background-position:0%;}
100%{background-position:300%;}
}

</style>

</head>

<body>

<div class="header">
<div class="header-inner">
<img src="left.png" class="logo">

<div class="title">Pharos PFP Lab</div>

<div class="header-line"></div>

<div class="header-buttons">

<a href="https://x.com/oooknorov" target="_blank" class="x-icon">

<svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
<path d="M18.244 2H21.5L14.8 9.6L22.7 22H16.6L11.8 14.9L5.6 22H2.3L9.5 13.8L2 2H8.2L12.6 8.5L18.244 2Z"/>
</svg>

</a>

</div>

</div>
</div>

<div class="container">

<div class="center-image">

<button class="arrow left" onclick="prevSlide()">❮</button>

<div class="slider-wrapper">
<div class="slider" id="slider">

<div class="slide"><img src="centr.jpg"></div>
<div class="slide"><img src="centr 2.jpg"></div>
<div class="slide"><img src="centr 3.jpg"></div>
<div class="slide"><img src="centr 5.jpg"></div>

</div>
</div>

<button class="arrow right" onclick="nextSlide()">❯</button>

</div>

<div class="button">
<a href="https://docs.google.com/forms/d/e/1FAIpQLSc83PnMHydifF9i0wZOFSJL-igh6bLhZgTlwsWMbPA8-Yw-2A/viewform" target="_blank">
Submit your PFP
</a>
</div>

<div class="footer">
© 2025 Pharos PFP Lab
</div>

</div>

<script>

let index = 0
const slider = document.getElementById("slider")
const slides = document.querySelectorAll(".slide")

function update(){
slider.style.transform = "translateX(-"+index*100+"%)"
}

function nextSlide(){
index++
if(index >= slides.length){ index = 0 }
update()
}

function prevSlide(){
index--
if(index < 0){ index = slides.length-1 }
update()
}

</script>

</body>
</html>
