<!DOCTYPE html>
<html>
<head>
<title>Pharos PFP Lab</title>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;

background:url("fon.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* ШАПКА */

.header{
width:100%;
padding:16px 30px;

display:flex;
align-items:center;
justify-content:space-between;

background:rgba(10,25,60,0.45);
backdrop-filter:blur(10px);

border-bottom:1px solid rgba(255,255,255,0.15);
}

.title{
font-size:38px;
font-weight:700;
letter-spacing:1px;
}

/* КНОПКИ В ШАПКЕ */

.header-buttons{
display:flex;
gap:14px;
}

.header-buttons a{
background:#6c5cff;
color:white;
padding:10px 22px;
border-radius:10px;
text-decoration:none;
font-size:16px;
font-weight:600;

transition:0.2s;
}

.header-buttons a:hover{
background:#5848ff;
transform:translateY(-2px);
}

/* КОНТЕНТ */

.container{
padding:50px 20px;
text-align:center;
}

/* РАМКА */

.center-image{
width:100%;
max-width:1100px;
margin:auto;

background:rgba(255,255,255,0.20);
border:3px solid rgba(255,255,255,0.50);

padding:30px;
border-radius:24px;

backdrop-filter:blur(14px);

box-shadow:
0 0 40px rgba(255,255,255,0.30),
0 0 90px rgba(180,220,255,0.30),
inset 0 0 25px rgba(255,255,255,0.20);
}

.center-image img{
width:100%;
border-radius:16px;
display:block;
}

/* КНОПКА SUBMIT */

.button{
margin-top:40px;
}

.button a{
background:#6c5cff;
color:white;
padding:16px 36px;
border-radius:12px;
text-decoration:none;
font-size:20px;
display:inline-block;
}

.button a:hover{
background:#5848ff;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
Pharos PFP Lab
</div>

<div class="header-buttons">

<a href="PASTE_TWITTER_LINK_HERE" target="_blank">
Twitter
</a>

<a href="PASTE_DISCORD_LINK_HERE" target="_blank">
Discord
</a>

</div>

</div>

<div class="container">

<div class="center-image">
<img src="centr.jpg">
</div>

<div class="button">
<a href="https://docs.google.com/forms/d/e/1FAIpQLSc83PnMHydifF9i0wZOFSJL-igh6bLhZgTlwsWMbPA8-Yw-2A/viewform" target="_blank">
Submit your PFP
</a>
</div>

</div>

</body>
</html>
