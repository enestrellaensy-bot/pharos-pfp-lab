<!DOCTYPE html>
<html>
<head>
<title>Pharos PFP Lab</title>

<style>

body{
margin:0;
background:#020617;
font-family:sans-serif;
color:white;
text-align:center;
}

.header{
background:url("up.png") center no-repeat;
background-size:contain;
height:320px;
display:flex;
align-items:center;
justify-content:center;
}

.header h1{
font-size:48px;
margin:0;
background:rgba(0,0,0,0.6);
padding:20px 40px;
border-radius:12px;
}

.container{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
max-width:900px;
margin:auto;
}

.card{
background:#0f172a;
padding:10px;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
}

.button{
margin-top:50px;
}

.button a{
background:#6c5cff;
color:white;
padding:15px 30px;
border-radius:10px;
text-decoration:none;
font-size:18px;
display:inline-block;
}

.button a:hover{
background:#5848ff;
}

</style>
</head>

<body>

<div class="header">
<h1>Pharos PFP Lab</h1>
</div>

<div class="container">

<div class="grid">

<div class="card">
<img src="pfp1.png">
</div>

<div class="card">
<img src="pfp2.png">
</div>

<div class="card">
<img src="pfp3.png">
</div>

<div class="card">
<img src="pfp4.png">
</div>

<div class="card">
<img src="pfp5.png">
</div>

<div class="card">
<img src="pfp6.png">
</div>

</div>

<div class="button">
<a href="PASTE_FORM_LINK_HERE">Submit your PFP</a>
</div>

</div>

</body>
</html>
