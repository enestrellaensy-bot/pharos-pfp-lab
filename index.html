<!DOCTYPE html>
<html>
<head>
<title>Pharos PFP Lab</title>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;

background:url("fon.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* HEADER */

.header{
width:100%;
background:rgba(10,25,60,0.45);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.15);
}

.header-inner{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 20px;
}

.title{
font-size:38px;
font-weight:700;
}

.header-buttons{
display:flex;
gap:14px;
}

.header-buttons a{
background:#6c5cff;
color:white;
padding:10px 22px;
border-radius:10px;
text-decoration:none;
font-size:16px;
font-weight:600;
}

/* CONTENT */

.container{
padding:50px 20px;
text-align:center;
}

/* FRAME */

.center-image{
width:100%;
max-width:1100px;
margin:auto;

background:rgba(255,255,255,0.20);
border:3px solid rgba(255,255,255,0.55);

padding:30px;
border-radius:24px;

backdrop-filter:blur(14px);

box-shadow:
0 0 40px rgba(255,255,255,0.35),
0 0 90px rgba(180,220,255,0.35),
inset 0 0 25px rgba(255,255,255,0.25);

overflow:hidden;
position:relative;
}

/* SLIDER */

.slider{
display:flex;
transition:transform 0.4s ease;
}

.slide{
min-width:100%;
}

.slide img{
width:100%;
border-radius:16px;
display:block;
}

/* ARROWS */

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);

background:rgba(0,0,0,0.5);
color:white;
border:none;

font-size:30px;
padding:10px 18px;

cursor:pointer;
border-radius:10px;
}

.arrow:hover{
background:rgba(0,0,0,0.8);
}

.left{
left:10px;
}

.right{
right:10px;
}

/* BUTTON */

.button{
margin-top:40px;
}

.button a{
background:#6c5cff;
color:white;
padding:16px 36px;
border-radius:12px;
text-decoration:none;
font-size:20px;
display:inline-block;
}

</style>
</head>

<body>

<div class="header">
<div class="header-inner">

<div class="title">
Pharos PFP Lab
</div>

<div class="header-buttons">
<a href="PASTE_TWITTER_LINK_HERE" target="_blank">Twitter</a>
<a href="PASTE_DISCORD_LINK_HERE" target="_blank">Discord</a>
</div>

</div>
</div>

<div class="container">

<div class="center-image">

<button class="arrow left" onclick="prevSlide()">❮</button>

<div class="slider" id="slider">

<div class="slide">
<img src="centr.jpg">
</div>

<div class="slide">
<img src="centr 2.jpg">
</div>

<div class="slide">
<img src="centr 3.jpg">
</div>

</div>

<button class="arrow right" onclick="nextSlide()">❯</button>

</div>

<div class="button">
<a href="https://docs.google.com/forms/d/e/1FAIpQLSc83PnMHydifF9i0wZOFSJL-igh6bLhZgTlwsWMbPA8-Yw-2A/viewform" target="_blank">
Submit your PFP
</a>
</div>

</div>

<script>

let index = 0
const slider = document.getElementById("slider")
const slides = document.querySelectorAll(".slide")

function update(){
slider.style.transform = "translateX(-"+index*100+"%)"
}

function nextSlide(){
index++
if(index >= slides.length){
index = 0
}
update()
}

function prevSlide(){
index--
if(index < 0){
index = slides.length-1
}
update()
}

</script>

</body>
</html>
