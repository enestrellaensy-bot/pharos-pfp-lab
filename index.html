<!DOCTYPE html>
<html>
<head>
<title>Pharos PFP Lab</title>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;
text-align:center;

background:url("fon.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* ШАПКА */

.header{
width:100%;
padding:18px 0;

background:rgba(10,25,60,0.45);
backdrop-filter:blur(10px);

border-bottom:1px solid rgba(255,255,255,0.15);
}

.header h1{
margin:0;
font-size:40px;
letter-spacing:1px;
}

/* КОНТЕНТ */

.container{
padding:50px 20px;
}

/* РАМКА АРТА */

.center-image{
width:100%;
max-width:1100px;
margin:auto;

background:rgba(255,255,255,0.20);
border:3px solid rgba(255,255,255,0.50);

padding:30px;
border-radius:24px;

backdrop-filter:blur(14px);

box-shadow:
0 0 40px rgba(255,255,255,0.30),
0 0 90px rgba(180,220,255,0.30),
inset 0 0 25px rgba(255,255,255,0.20);
}

.center-image img{
width:100%;
border-radius:16px;
display:block;
}

/* КНОПКА */

.button{
margin-top:40px;
}

.button a{
background:#6c5cff;
color:white;
padding:16px 36px;
border-radius:12px;
text-decoration:none;
font-size:20px;
display:inline-block;
}

.button a:hover{
background:#5848ff;
}

</style>
</head>

<body>

<div class="header">
<h1>Pharos PFP Lab</h1>
</div>

<div class="container">

<div class="center-image">
<img src="centr.jpg">
</div>

<div class="button">
<a href="https://docs.google.com/forms/d/e/1FAIpQLSc83PnMHydifF9i0wZOFSJL-igh6bLhZgTlwsWMbPA8-Yw-2A/viewform" target="_blank">
Submit your PFP
</a>
</div>

</div>

</body>
</html>
