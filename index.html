<!DOCTYPE html>
<html>
<head>
<title>Pharos PFP Lab</title>

<style>

body{
margin:0;
font-family:sans-serif;
color:white;
text-align:center;

background:url("fon.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* ШАПКА */

.header{
width:100%;
padding:20px 0;
background:rgba(5,15,40,0.85);
backdrop-filter:blur(8px);
box-shadow:0 4px 20px rgba(0,0,0,0.6);
}

.header h1{
margin:0;
font-size:42px;
letter-spacing:1px;
}

/* КОНТЕНТ */

.container{
padding:40px 20px;
}

/* СВЕТЛАЯ РАМКА */

.center-image{
width:100%;
max-width:1100px;
margin:auto;

background:rgba(255,255,255,0.18);
border:3px solid rgba(255,255,255,0.45);

padding:30px;
border-radius:24px;

backdrop-filter:blur(14px);

box-shadow:
0 0 40px rgba(255,255,255,0.25),
0 0 80px rgba(180,220,255,0.25),
inset 0 0 20px rgba(255,255,255,0.15);
}

.center-image img{
width:100%;
border-radius:16px;
display:block;
}

/* КНОПКА */

.button{
margin-top:40px;
}

.button a{
background:#6c5cff;
color:white;
padding:16px 36px;
border-radius:12px;
text-decoration:none;
font-size:20px;
display:inline-block;
}

.button a:hover{
background:#5848ff;
}

</style>
</head>

<body>

<div class="header">
<h1>Pharos PFP Lab</h1>
</div>

<div class="container">

<div class="center-image">
<img src="centr.jpg">
</div>

<div class="button">
<a href="PASTE_FORM_LINK_HERE">Submit your PFP</a>
</div>

</div>

</body>
</html>
